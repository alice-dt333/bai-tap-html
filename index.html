<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Khung Nội Dung</title>
    <style>
        /* Cài đặt cơ bản cho toàn bộ trang */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif, sans-serif; /* Font có chân giống trong ảnh */
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 1. KHUNG CHỨA CHÍNH (CARD) */
        .news-card {
            max-width: 500px;
            width: 100%;
            border: 1px solid #b5b5b5; /* Viền xám mảnh */
            border-radius: 16px; /* Bo góc mềm mại */
            overflow: hidden;
            background-color: #e5e5e5; /* Màu nền xám bên dưới */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* 2. VÙNG PHÍA TRÊN (Chứa ảnh và Tiêu đề) */
        .card-top {
            background-color: #ededed; /* Màu nền xám nhạt hơn ở phía trên */
            padding: 16px 16px 12px 16px;
        }

        .card-image {
            width: 100%;
            display: block;
            border: 1px solid #999; /* Viền mảnh xung quanh ảnh */
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: #222538;
            line-height: 1.3;
        }

        /* 3. VÙNG PHÍA DƯỚI (Chứa danh sách câu hỏi) */
        .card-bottom {
            padding: 20px 20px 24px 24px;
        }

        .card-list {
            list-style-type: disc; /* Dấu chấm đầu dòng */
            padding-left: 15px;
        }

        .card-list li {
            font-size: 14px;
            color: #2b2b2b;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        /* Bỏ khoảng cách thừa của mục cuối cùng */
        .card-list li:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="news-card">
        
        <div class="card-top">
            <img class="card-image" src="hoc-sinh.png" alt="Học sinh Nghệ An">
            <h2 class="card-title">Nghệ An 4/441 bài thi vào lớp 10 thay đổi điểm sau chấm phúc khảo</h2>
        </div>

        <div class="card-bottom">
            <ul class="card-list">
                <li>Mốc thời gian thí sinh cần nhớ sau kỳ thi THPT Quốc gia 2019</li>
                <li>Có cần thiết phải chấm lại toàn bộ những bài thi ngữ văn có điểm cao?</li>
                <li>Xử lý như thế nào nếu điểm bài thi Ngữ văn lệch nhau giữa 2 lần chấm?</li>
            </ul>
        </div>

    </div>

</body>
</html>
